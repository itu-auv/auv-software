cameras:
  front:
    image_topic: "/{ns}/cameras/cam_front/image_raw"
    camera_info_topic: "/{ns}/cameras/cam_front/camera_info"
    optical_frame: "{ns}/base_link/front_camera_optical_link_stabilized"
    result_topic: "/yolo_result_front"
    image_out_topic: "/yolo_image_front"

  bottom:
    image_topic: "/{ns}/cameras/cam_bottom/image_raw"
    camera_info_topic: "/{ns}/cameras/cam_bottom/camera_info"
    optical_frame: "{ns}/base_link/bottom_camera_optical_link"
    result_topic: "/yolo_result_bottom"
    image_out_topic: "/yolo_image_bottom"

  torpedo:
    image_topic: "/{ns}/cameras/cam_torpedo/image_raw"
    camera_info_topic: "/{ns}/cameras/cam_torpedo/camera_info"
    optical_frame: "{ns}/base_link/torpedo_camera_optical_link"
    result_topic: "/yolo_result_torpedo"
    image_out_topic: "/yolo_image_torpedo"

  bottom_seg:
    image_topic: "/{ns}/cameras/cam_bottom/image_raw"
    camera_info_topic: "/{ns}/cameras/cam_bottom/camera_info"
    optical_frame: "{ns}/base_link/bottom_camera_optical_link"
    result_topic: "/yolo_result_seg"
    image_out_topic: "/yolo_image_seg"

  realsense:
    image_topic: "/{ns}/camera/color/image_raw"
    camera_info_topic: "/{ns}/camera/color/camera_info"
    optical_frame: "{ns}/camera_depth_optical_frame"
    result_topic: "/yolo_result_realsense"
    image_out_topic: "/yolo_image_realsense"

objects:
  # Gate signs - 0.3048 m (1 ft) square, face in YZ plane
  - class_id: 0
    name: sawfish
    cameras: [front, realsense]
    gazebo_model: robosub_gate
    offset: [0.0, -0.762, 1.356]
    boundary:
      shape: rect
      args: [0, 0.1524, 0.1524]
    occlusion_mesh: models/robosub_gate/meshes/gate.dae

  - class_id: 1
    name: shark
    cameras: [front, realsense]
    gazebo_model: robosub_gate
    offset: [0.0, 0.762, 1.356]
    boundary:
      shape: rect
      args: [0, 0.1524, 0.1524]

  # Torpedo map panel - 0.6096 m (2 ft) square, face in YZ plane
  - class_id: 4
