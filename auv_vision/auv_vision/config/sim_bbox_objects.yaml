    cameras: [front, realsense]
    gazebo_model: robosub_torpedo
    offset: [-0.1166, 0.6472, -0.9490]
    boundary:
      shape: rect
      args: [0, 0.3048, -0.3048]

  # Torpedo holes - 4 red circles printed on the torpedo_map texture.
  # Two small (0.100 m diameter) and two large (0.125 m diameter).
  # All published as ID 5 - the pose estimator sorts upper/lower by image Y.
  - class_id: 5
    name: torpedo_hole
    cameras: [torpedo]
    gazebo_model: robosub_torpedo
    offset: [-0.1166, 0.8348, -0.9472]
    boundary:
      shape: circle
      args: [0, 0.0500, 0.0500]

  - class_id: 5
    name: torpedo_hole
    cameras: [torpedo]
    gazebo_model: robosub_torpedo
    offset: [-0.1166, 0.7077, -0.7443]
    boundary:
      shape: circle
      args: [0, 0.0626, 0.0626]

  - class_id: 5
