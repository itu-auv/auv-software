cameras:
  front:
    ns: "taluy/cameras/cam_front"
    frame: "taluy/base_link/front_camera_optical_link_stabilized"
    yolo_topic: "/yolo_result_front"
    handler: "front_camera_handler"
    image_width: 640
    image_height: 480
    id_tf_map:
      0: gate_search_rescue_link
      1: gate_survey_repair_link
      4: torpedo_map_link
      6: bin_basket_link
      7: octagon_link
      8: octagon_repair_link
      9: octagon_rescue_link
      10: octagon_search_link
      11: octagon_survey_link
  bottom:
    ns: "taluy/cameras/cam_bottom"
    frame: "taluy/base_link/bottom_camera_optical_link"
    yolo_topic: "/yolo_result_bottom"
    handler: "bottom_camera_handler"
    image_width: 640
    image_height: 480
    id_tf_map:
      0: bin_blood_link
      1: bin_fire_link
      2: octagon_table_link
      3: basket_redcross_link
      4: basket_warning_link
  slalom:
    ns: "taluy/cameras/cam_front"
    frame: "taluy/base_link/front_camera_optical_link_stabilized"
    yolo_topic: "/yolo_result_slalom"
    handler: "slalom_camera_handler"
    image_width: 640
    image_height: 480
    id_tf_map:
      2: slalom_red_pipe_link
      3: slalom_white_pipe_link
  torpedo:
    ns: "taluy/cameras/cam_torpedo"
    frame: "taluy/base_link/torpedo_camera_optical_link"
    yolo_topic: "/yolo_result_torpedo"
    handler: "torpedo_camera_handler"
    image_width: 800
    image_height: 448
    bootstrap_holes_required: 4
    hole_tracking_min_distance_px: 60.0
    hole_tracking_distance_scale: 0.9
    hole_tracking_min_iou: 0.05
    hole_tracking_iou_weight: 0.35
    forbidden_side_masks:
      - - [0, 0]
        - [185, 0]
        - [145, 45]
        - [118, 95]
        - [102, 155]
        - [96, 225]
        - [106, 290]
        - [130, 360]
        - [175, 447]
        - [0, 447]
      - - [799, 0]
        - [615, 0]
        - [655, 45]
        - [682, 95]
        - [698, 155]
        - [704, 225]
        - [694, 290]
        - [670, 360]
        - [625, 447]
        - [799, 447]
    id_tf_map:
      5: torpedo_hole_link
  front_kde:
    ns: "taluy/cameras/cam_front"
    frame: "taluy/base_link/front_camera_optical_link_stabilized"
    yolo_topic: "/yolo_result_front"
    handler: "kde_camera_handler"
    default_enabled: true
    image_width: 640
    image_height: 480
    id_tf_map:
      0: gate_search_rescue_link
      1: gate_survey_repair_link
      4: torpedo_map_link
      6: bin_basket_link
      7: octagon_link
      0: torpedo_hole_link
  bottom_seg:
    ns: "taluy/cameras/cam_bottom"
    frame: "taluy/base_link/bottom_camera_optical_link"
    yolo_topic: "/yolo_result_seg"
    handler: "segment_camera_handler"
    image_width: 640
    image_height: 480
    id_tf_map:
      0: bandaid_link
      1: electric_link
      2: nutbolt_link
      3: pill_link
      4: basket_redcross_segment_link
      5: octagon_table_segment_link
      6: basket_warning_segment_link

# Prop dimensions for distance estimation (link_name -> dimensions)
