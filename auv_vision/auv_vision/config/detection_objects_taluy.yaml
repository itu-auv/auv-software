  torpedo_hole_top_mid_link: {name: "torpedo_hole", real_height: 0.1275, real_width: 0.1275}
  bin_whole_link: {name: "bin_whole", real_height: null, real_width: null}
  octagon_link: {name: "octagon", real_height: 0.74, real_width: 0.91}
  octagon_repair_link: {name: "octagon_repair", real_height: 0.305, real_width: 0.305}
