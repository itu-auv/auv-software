  gate_search_rescue_link: {name: "gate_search_rescue", real_height: 0.3048, real_width: 0.3048}
  gate_survey_repair_link: {name: "gate_survey_repair", real_height: 0.3048, real_width: 0.3048}
  slalom_red_pipe_link: {name: "slalom_red_pipe", real_height: 0.9, real_width: 0.0254}
  slalom_white_pipe_link: {name: "slalom_white_pipe", real_height: 0.9, real_width: 0.0254}
  torpedo_map_link: {name: "torpedo_map", real_height: 0.6096, real_width: 0.6096}
  torpedo_hole_left_mid_link: {name: "torpedo_hole", real_height: 0.1525, real_width: 0.1525}
