# Consumer config for keypoint_pose_node.
#
# Two valve_keypoint_node instances (one per camera) publish KeypointResult
# messages tagged with kp.object="valve_front" or kp.object="valve_bottom" and
# 1-indexed keypoint ids (1..N). keypoint_pose_node groups by `object_names`,
# runs PnP on the points listed in `model`, and broadcasts a TransformStamped
# per `outputs` entry. Optional `state_keypoint` overrides the rotation about
# model X using a single in-plane keypoint (the valve handle tip).
#
# The two valves use the same physical mesh, so the model points (in each
# valve link's local frame) are identical and shared via a YAML anchor below.
# Per-valve geometry differences live in the URDF/SDF <pose> of the valve
# link; PnP recovers whichever link is currently visible to whichever camera.

cameras:
  front:
    frame: "taluy/base_link/front_camera_optical_link"
    camera_info_topic: "/taluy/cameras/cam_front/camera_info"
    keypoint_topic: "/keypoint_result_front"
    # Raw image the pose node draws its debug overlay on (keypoints, bbox,
    # PnP inliers/outliers, pose axis). Matched to keypoints by header stamp.
    image_topic: "/taluy/cameras/cam_front/image_raw"
  bottom:
    frame: "taluy/base_link/bottom_camera_optical_link"
    camera_info_topic: "/taluy/cameras/cam_bottom/camera_info"
    keypoint_topic: "/keypoint_result_bottom"
    image_topic: "/taluy/cameras/cam_bottom/image_raw"

# Shared 8-point pose model: 8 bolts on the flange face (0.103 m radius ring,
# 45° spacing). Both valves are the same mesh, so the coordinates in the link's
# local frame are identical. The face centre (kp9) is NOT a PnP point — it now
# feeds the handle line fit below instead.
_valve_pose_model: &valve_pose_model
  - shape: points
    ids: [1, 2, 3, 4, 5, 6, 7, 8]
    args:
      - [0.020, -0.072832, -0.072832] # kp1: bolt -135°
      - [0.020, 0.000000, -0.103000] # kp2: bolt -90°
      - [0.020, 0.072832, -0.072832] # kp3: bolt -45°
      - [0.020, 0.103000, 0.000000] # kp4: bolt 0°
      - [0.020, 0.072832, 0.072832] # kp5: bolt 45°
      - [0.020, 0.000000, 0.103000] # kp6: bolt 90°
      - [0.020, -0.072832, 0.072832] # kp7: bolt 135°
      - [0.020, -0.103000, 0.000000] # kp8: bolt 180°

# Handle line: kp9 (face centre), kp10 (arrow tip) and kp11 (the new handle-end
# point) are collinear along the valve handle. None of them are used by PnP.
# Collinearity is gated in image pixels (attitude-independent); the direction
# that sets the published frame's roll about the flange normal comes from the
# same points back-projected onto the valve plane, signed by `arrow_id` (axis
# points from the face centre toward the arrow tip). All 3 must be present.
_valve_handle_line: &valve_handle_line
  keypoint_ids: [9, 10, 11]
  arrow_id: 10
  output_axis: z
  confidence_threshold: 0.5
  parallel_eps_rad: 0.087 # ~5°: skip if valve seen edge-on
  max_line_error_px: 5.0 # px: max perpendicular residual of the 2D line fit

objects:
  - name: valve_front
    object_names: [valve_front]
    cameras: [front]
    min_keypoints: 4
    solver: ippe
    refine_iterative: false
    confidence_threshold: 0.5
    reprojection_error_threshold: 5.0
    max_distance: 8.0
    model: *valve_pose_model
    outputs:
      - child_frame_id: tac/valve_front
        offset: [0.0, 0.0, 0.0]
    handle_line: *valve_handle_line

  - name: valve_bottom
    object_names: [valve_bottom]
    cameras: [bottom]
    min_keypoints: 4
    solver: ippe
    refine_iterative: false
    confidence_threshold: 0.5
    reprojection_error_threshold: 5.0
    max_distance: 8.0
    model: *valve_pose_model
    outputs:
      - child_frame_id: tac/valve_bottom
        offset: [0.0, 0.0, 0.0]
    handle_line: *valve_handle_line
