#!/usr/bin/env python3
PACKAGE = "auv_vision"

# Dynamic reconfigure schema for opencv_seg_publisher.
# Field names MUST match utils/pipe_segmentation.SegParams exactly, so a dynparam
# dump round-trips through params_from_dict / params_to_dict unchanged.

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# --- Preprocessing ---
pre = gen.add_group("Preprocessing")
pre.add("blur_ksize", int_t, 0,
    "Gaussian blur kernel before colour thresholding (<=1 disables; forced odd). "
    "Increase to suppress speckle in turbid water.", 5, 0, 31)
pre.add("resize_width", int_t, 0,
    "Downscale the image to this width before segmenting for speed (0 = full res). "
    "The output mask is upscaled back to full resolution.", 0, 0, 1920)

# --- HSV colour mask ---
hsv = gen.add_group("HSV")
hsv.add("h_min", int_t, 0,
    "Min hue (0-179). If h_min > h_max the hue range wraps around 180.", 18, 0, 179)
hsv.add("h_max", int_t, 0, "Max hue (0-179).", 44, 0, 179)
hsv.add("s_min", int_t, 0,
    "Min saturation. Raise to reject washed-out background; lower to catch the "
    "faded distant pipe.", 70, 0, 255)
hsv.add("s_max", int_t, 0, "Max saturation.", 255, 0, 255)
hsv.add("v_min", int_t, 0,
    "Min value/brightness. The pipe is much brighter than the murky water, so this "
    "is usually the strongest discriminator.", 150, 0, 255)
hsv.add("v_max", int_t, 0, "Max value/brightness.", 255, 0, 255)

# --- Lab b-channel mask ---
lab = gen.add_group("Lab_b")
lab.add("lab_b_min", int_t, 0,
    "Min Lab b channel (yellowness). High even when the pipe is faded, so it "
    "rescues the distant pale pipe that HSV saturation misses.", 180, 0, 255)
lab.add("lab_b_max", int_t, 0, "Max Lab b channel.", 255, 0, 255)

combine_enum = gen.enum([
    gen.const("hsv_only", int_t, 0, "Use the HSV mask only"),
    gen.const("lab_only", int_t, 1, "Use the Lab b mask only"),
    gen.const("and_both", int_t, 2, "HSV AND Lab (precision: both must agree)"),
    gen.const("or_both",  int_t, 3, "HSV OR Lab (recall: either cue suffices)"),
], "How to merge the HSV and Lab masks")
gen.add("combine_mode", int_t, 0, "Merge mode for HSV and Lab masks", 2, 0, 3,
        edit_method=combine_enum)

# --- Morphology ---
morph = gen.add_group("Morphology")
morph.add("open_kernel", int_t, 0,
    "Ellipse open kernel (erode then dilate; <=1 disables). Removes the thin "
    "orange tether and speckle.", 5, 0, 51)
morph.add("close_kernel", int_t, 0,
    "Ellipse close kernel (dilate then erode; <=1 disables). Fills the white "
    "marker holes on the pipe.", 21, 0, 101)

# --- Connected-component filter ---
comp = gen.add_group("Components")
comp.add("min_area_px", int_t, 0,
    "Drop connected components smaller than this many pixels.", 1000, 0, 200000)
comp.add("keep_largest", bool_t, 0,
    "Keep only the single largest component.", False)
comp.add("max_components", int_t, 0,
    "If keep_largest is false, keep this many largest components.", 2, 1, 20)
comp.add("max_aspect", double_t, 0,
    "Reject components whose bounding-box aspect ratio (long/short) exceeds this "
    "(0 = off). Helps drop the thin tether.", 0.0, 0.0, 50.0)
comp.add("min_fill", double_t, 0,
    "Reject components whose area / bounding-box-area is below this (0 = off). "
    "Helps drop thin diagonal structures like the tether.", 0.0, 0.0, 1.0)
comp.add("fill_holes", bool_t, 0,
    "Flood-fill fully enclosed holes after filtering (e.g. remaining marker holes).",
    True)

exit(gen.generate(PACKAGE, "opencv_seg_publisher", "OpenCVSeg"))
