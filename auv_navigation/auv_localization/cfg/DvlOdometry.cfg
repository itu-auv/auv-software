#!/usr/bin/env python
PACKAGE = "auv_localization"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("docking_mode", bool_t, 0, "Zero DVL-invalid velocity (no model fallback) for docking", False)

pos = gen.add_group("DVL_Invalid_Position_Gains")
pos.add("dvl_invalid_position_kp_x", double_t, 0, "Position Kp X when DVL invalid", 1.0, 0.0, 100.0)
pos.add("dvl_invalid_position_kp_y", double_t, 0, "Position Kp Y when DVL invalid", 1.0, 0.0, 100.0)
pos.add("dvl_invalid_position_ki_x", double_t, 0, "Position Ki X when DVL invalid", 0.0, 0.0, 10.0)
pos.add("dvl_invalid_position_ki_y", double_t, 0, "Position Ki Y when DVL invalid", 0.0, 0.0, 10.0)
pos.add("dvl_invalid_position_kd_x", double_t, 0, "Position Kd X when DVL invalid", 0.0, 0.0, 10.0)
pos.add("dvl_invalid_position_kd_y", double_t, 0, "Position Kd Y when DVL invalid", 0.0, 0.0, 10.0)

vel = gen.add_group("DVL_Invalid_Velocity_Gains")
vel.add("dvl_invalid_velocity_kp_x", double_t, 0, "Velocity Kp X when DVL invalid", 1.0, 0.0, 100.0)
vel.add("dvl_invalid_velocity_kp_y", double_t, 0, "Velocity Kp Y when DVL invalid", 1.0, 0.0, 100.0)
vel.add("dvl_invalid_velocity_ki_x", double_t, 0, "Velocity Ki X when DVL invalid", 0.0, 0.0, 10.0)
vel.add("dvl_invalid_velocity_ki_y", double_t, 0, "Velocity Ki Y when DVL invalid", 0.0, 0.0, 10.0)
vel.add("dvl_invalid_velocity_kd_x", double_t, 0, "Velocity Kd X when DVL invalid", 1.0, 0.0, 10.0)
vel.add("dvl_invalid_velocity_kd_y", double_t, 0, "Velocity Kd Y when DVL invalid", 1.0, 0.0, 10.0)

exit(gen.generate(PACKAGE, "dvl_to_odom_node", "DvlOdometry"))
