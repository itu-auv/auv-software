#!/usr/bin/env python

PACKAGE = "auv_control"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

axis_names = ["x", "y", "z", "roll", "pitch", "yaw"]

for i, axis in enumerate(axis_names):
    gen.add(
        f"pose_kp_{i}",
        double_t,
        0,
        f"Pose-loop proportional gain for {axis}",
        0.0,
        -20.0,
        20.0,
    )
    gen.add(
        f"vel_kp_{i}",
        double_t,
        0,
        f"Velocity-loop proportional gain for {axis}",
        0.0,
        -20.0,
        20.0,
    )
    gen.add(
        f"vel_ki_{i}",
        double_t,
        0,
        f"Velocity-loop integral gain for {axis}",
        0.0,
        -20.0,
        20.0,
    )
    gen.add(
        f"vel_kd_{i}",
        double_t,
        0,
        f"Velocity-loop derivative gain for {axis}",
        0.0,
        -20.0,
        20.0,
    )
    gen.add(
        f"vel_integral_clamp_limits_{i}",
        double_t,
        0,
        f"Velocity-loop integral clamp limit for {axis} (0 = no clamping)",
        0.0,
        0.0,
        100.0,
    )

gen.add("gravity_compensation_z", double_t, 0, "Gravity compensation for z-axis", 0.0, -100.0, 100.0)

for i, axis in enumerate(axis_names):
    gen.add(f"max_velocity_{i}", double_t, 0, f"Max desired twist limit for {axis}", 1.0, 0.0, 10.0)

gen.generate(PACKAGE, "auv", "Controller")
